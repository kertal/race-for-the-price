# grafana-vs-kibana — Docker Compose
#
# Services:
#   es-8          Elasticsearch 8.15.3  (internal, used by kibana-2024)
#   es-latest     Elasticsearch 8.17.6  (internal, used by kibana-2026 + Grafana)
#   kibana-2024   Kibana 8.15.3         → http://localhost:5601
#   kibana-2026   Kibana 8.17.6         → http://localhost:5602
#   grafana-2024  Grafana 11.1.0        → http://localhost:3001
#   grafana-2026  Grafana 11.4.0        → http://localhost:3002
#
# Memory estimate: ~5 GB total
#
# Usage:
#   cd races/grafana-vs-kibana/docker
#   docker compose up -d
#   bash init.sh          # loads sample data once all services are healthy
#
# Update kibana-2026 / grafana-2026 tags to the exact Feb 2026 releases
# once they are known. Check: https://www.docker.elastic.co/r/kibana
#                             https://hub.docker.com/r/grafana/grafana/tags

services:

  # ── Elasticsearch for Kibana 2024 ─────────────────────────────────────────
  es-8:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.3
    environment:
      - discovery.type=single-node
      - ELASTIC_PASSWORD=changeme
      - xpack.security.http.ssl.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ulimits:
      memlock: { soft: -1, hard: -1 }
    mem_limit: 1200m
    healthcheck:
      test: ["CMD-SHELL", "curl -sf -u elastic:changeme http://localhost:9200/_cluster/health?wait_for_status=yellow"]
      interval: 10s
      timeout: 5s
      retries: 30

  # ── Elasticsearch for Kibana 2026 + Grafana ────────────────────────────────
  es-latest:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.17.6
    environment:
      - discovery.type=single-node
      - ELASTIC_PASSWORD=changeme
      - xpack.security.http.ssl.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ulimits:
      memlock: { soft: -1, hard: -1 }
    mem_limit: 1200m
    healthcheck:
      test: ["CMD-SHELL", "curl -sf -u elastic:changeme http://localhost:9200/_cluster/health?wait_for_status=yellow"]
      interval: 10s
      timeout: 5s
      retries: 30

  # ── Init: set kibana_system password on es-8 before Kibana starts ─────────
  init-es-8:
    image: curlimages/curl:latest
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "curl -sf -u elastic:changeme
      -X POST 'http://es-8:9200/_security/user/kibana_system/_password'
      -H 'Content-Type: application/json'
      -d '{\"password\":\"kibana_password\"}'
      && echo ' kibana_system password set on es-8'"
    depends_on:
      es-8:
        condition: service_healthy
    restart: "no"

  # ── Init: set kibana_system password on es-latest before Kibana starts ────
  init-es-latest:
    image: curlimages/curl:latest
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "curl -sf -u elastic:changeme
      -X POST 'http://es-latest:9200/_security/user/kibana_system/_password'
      -H 'Content-Type: application/json'
      -d '{\"password\":\"kibana_password\"}'
      && echo ' kibana_system password set on es-latest'"
    depends_on:
      es-latest:
        condition: service_healthy
    restart: "no"

  # ── Kibana August 2024 (8.15.3) ───────────────────────────────────────────
  kibana-2024:
    image: docker.elastic.co/kibana/kibana:8.15.3
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://es-8:9200
      - ELASTICSEARCH_USERNAME=kibana_system
      - ELASTICSEARCH_PASSWORD=kibana_password
      - XPACK_FLEET_ENABLED=false
    depends_on:
      init-es-8:
        condition: service_completed_successfully
    mem_limit: 1500m
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5601/api/status | grep -q overall"]
      interval: 15s
      timeout: 10s
      retries: 30

  # ── Kibana February 2026 (8.17.6 — update tag to actual Feb 2026 release) ─
  kibana-2026:
    image: docker.elastic.co/kibana/kibana:8.17.6
    ports:
      - "5602:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://es-latest:9200
      - ELASTICSEARCH_USERNAME=kibana_system
      - ELASTICSEARCH_PASSWORD=kibana_password
      - XPACK_FLEET_ENABLED=false
    depends_on:
      init-es-latest:
        condition: service_completed_successfully
    mem_limit: 1500m
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5601/api/status | grep -q overall"]
      interval: 15s
      timeout: 10s
      retries: 30

  # ── Grafana August 2024 (11.1.0) ──────────────────────────────────────────
  grafana-2024:
    image: grafana/grafana:11.1.0
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_AUTH_ANONYMOUS_ENABLED=false
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      es-latest:
        condition: service_healthy
    mem_limit: 512m
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health | grep -q ok"]
      interval: 10s
      timeout: 5s
      retries: 20

  # ── Grafana February 2026 (11.4.0 — update tag to actual Feb 2026 release) ─
  grafana-2026:
    image: grafana/grafana:11.4.0
    ports:
      - "3002:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_AUTH_ANONYMOUS_ENABLED=false
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      es-latest:
        condition: service_healthy
    mem_limit: 512m
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health | grep -q ok"]
      interval: 10s
      timeout: 5s
      retries: 20
