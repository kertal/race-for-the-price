# kibana-discover-evolution — Docker Compose
#
# 5 Kibana versions across 5 years, each with its own Elasticsearch.
# Every Kibana MUST be paired with a matching Elasticsearch version.
#
# ⚠️  Memory: ~10 GB required (5× ES + 5× Kibana).
#     Minimum specs: 16 GB RAM host recommended.
#     If tight on memory, start only the versions you need:
#       docker compose up -d es-2024 init-2024 kibana-2024
#
# Ports:
#   5621  Kibana 2022  (8.4.3)
#   5622  Kibana 2023  (8.8.2)
#   5623  Kibana 2024  (8.15.3)
#   5624  Kibana 2025  (8.17.3  — verify patch on https://www.docker.elastic.co/r/kibana)
#   5625  Kibana 2026  (latest  — pin to actual Feb 2026 release)
#
# Usage:
#   cd races/kibana-discover-evolution/docker
#   docker compose up -d
#   bash init.sh

services:

  # ── 2022: Kibana 8.4.3 (August 2022) ─────────────────────────────────────
  es-2022:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.4.3
    environment:
      - discovery.type=single-node
      - ELASTIC_PASSWORD=changeme
      - xpack.security.http.ssl.enabled=false
      - ES_JAVA_OPTS=-Xms256m -Xmx256m
    ulimits:
      memlock: { soft: -1, hard: -1 }
    mem_limit: 700m
    healthcheck:
      test: ["CMD-SHELL", "curl -sf -u elastic:changeme http://localhost:9200/_cluster/health?wait_for_status=yellow"]
      interval: 10s
      timeout: 5s
      retries: 30

  init-2022:
    image: curlimages/curl:latest
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "curl -sf -u elastic:changeme
      -X POST 'http://es-2022:9200/_security/user/kibana_system/_password'
      -H 'Content-Type: application/json'
      -d '{\"password\":\"kibana_password\"}'
      && echo ' kibana_system set on es-2022'"
    depends_on:
      es-2022:
        condition: service_healthy
    restart: "no"

  kibana-2022:
    image: docker.elastic.co/kibana/kibana:8.4.3
    ports:
      - "5621:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://es-2022:9200
      - ELASTICSEARCH_USERNAME=kibana_system
      - ELASTICSEARCH_PASSWORD=kibana_password
      - XPACK_FLEET_ENABLED=false
    depends_on:
      init-2022:
        condition: service_completed_successfully
    mem_limit: 1400m
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5601/api/status | grep -q overall"]
      interval: 15s
      timeout: 10s
      retries: 30

  # ── 2023: Kibana 8.8.2 (June 2023) ───────────────────────────────────────
